<!DOCTYPE html> 
<html lang="en">
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Gör sidan bättre på mobil -->
  <title>Task Tracker</title> <!-- Titel i webbläsaren -->
</head> 

<body> <!-- Här kommer allt som syns -->

  <h1 id="title">Task Tracker</h1> <!-- Rubrik för appen -->

  <form id="task-form"> <!-- Formulär så vi kan skicka in en task på rätt sätt -->

    <input id="task-input" type="text" placeholder="New task"> <!-- Här skriver man taskens namn -->

    <select id="priority-input"> <!-- Här väljer man prioritet -->
      <option value="low">Low</option> <!-- Låg prioritet -->
      <option value="medium" selected>Medium</option> <!-- Medium är standard -->
      <option value="high">High</option> <!-- Hög prioritet -->
    </select> <!-- Slut på dropdown -->

    <button type="submit">Add Task</button> <!-- Submit-knapp för formuläret -->

  </form> <!-- Slut på formuläret -->

  <p id="error-message"></p> <!-- Här visar jag felmeddelanden -->

  <ul id="task-list"></ul> <!-- Här visas alla tasks -->

  <p id="stats"></p> <!-- Här visas statistik -->

  <script type="module" src="./dist/main.js"></script> <!-- Kopplar till JavaScript från TypeScript -->

</body> <!-- Slut på body -->
</html> <!-- Slut på HTML -->
